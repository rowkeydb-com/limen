name: Code Coverage

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile.ci
          tags: limen-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate coverage report
        # The script runs `bazel coverage` inside the CI container and
        # places the resulting lcov at ./coverage.lcov. If no test
        # targets exist yet, an empty coverage.lcov is produced.
        run: .github/scripts/run-bazel-in-docker.sh coverage coverage

      - name: Generate HTML report
        if: ${{ hashFiles('coverage.lcov') != '' }}
        run: |
          if [ -s coverage.lcov ]; then
            docker run --rm \
              -v "$PWD":/workspace \
              --user "$(id -u):$(id -g)" \
              -w /workspace limen-ci \
              genhtml coverage.lcov -o coverage_html \
                --ignore-errors source,negative \
                --legend \
                --title "Limen Coverage"
          else
            echo "Empty coverage.lcov; skipping HTML generation."
          fi

      - name: Upload to Codecov
        if: ${{ hashFiles('coverage.lcov') != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          flags: unittests
          name: limen-coverage
          # Surface upload failures as CI failures. Previously
          # false to avoid masking unrelated issues during setup;
          # now that the integration is working, silent upload
          # failures must not pass.
          fail_ci_if_error: true
          # Disable the default plugins (gcov auto-discovery, etc.).
          # Bazel produces the combined lcov in `coverage.lcov` and
          # the action's gcov plugin otherwise walks `.gcno` files
          # in `.cache/bazel/.../sandbox/...` whose corresponding
          # `coverage.dat` files have been cleaned up by the test
          # runner, crashing with FileNotFoundError. With noop we
          # upload only the explicit lcov file.
          plugins: noop
          disable_search: true

      - name: Upload HTML report
        if: ${{ hashFiles('coverage_html/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 30
